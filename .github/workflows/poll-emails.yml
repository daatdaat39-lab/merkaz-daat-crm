name: Poll email connections for new leads

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Call poll-emails endpoint
        run: |
          curl -sf -X GET "https://merkaz-daat-crm-8ubv.vercel.app/api/cron/poll-emails" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
